name: Build APK

on:
  workflow_dispatch:        # امکان اجرای دستی از تب Actions
  push:
    branches: [ main ]      # با هر commit روی شاخه‌ی main خودکار اجرا می‌شود

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 9.1.0
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --no-configuration-cache

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: radar-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
